name: Flutter CI
permissions:
  contents: write

on:
  push:
    branches: [master, dev]
    paths:
      - 'client/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    branches: [master, dev]
    paths:
      - 'client/**'
      - '.github/workflows/flutter-ci.yml'
  workflow_dispatch:

env:
  FLUTTER_WORKING_DIR: client

jobs:
  setup:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FLUTTER_WORKING_DIR }}
    outputs:
      flutter-version: ${{ steps.read-flutter-version.outputs.FLUTTER_VERSION }}
      cache-key-pub: ${{ steps.cache-keys.outputs.pub }}
      cache-key-gradle: ${{ steps.cache-keys.outputs.gradle }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read Flutter version
        id: read-flutter-version
        run: |
          FLUTTER_VERSION=$(cat flutter_version)
          echo "FLUTTER_VERSION=$FLUTTER_VERSION" >> $GITHUB_OUTPUT

      - name: Generate cache keys
        id: cache-keys
        run: |
          echo "pub=${{ runner.os }}-pub-cache-${{ hashFiles('client/pubspec.yaml', 'client/pubspec.lock', 'client/packages/*/pubspec.yaml') }}" >> $GITHUB_OUTPUT
          echo "gradle=${{ runner.os }}-gradle-${{ hashFiles('client/**/*.gradle*', 'client/**/gradle-wrapper.properties') }}" >> $GITHUB_OUTPUT

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ steps.read-flutter-version.outputs.FLUTTER_VERSION }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ steps.cache-keys.outputs.pub }}
          restore-keys: ${{ runner.os }}-pub-cache-

      - name: Activate melos and bootstrap
        run: |
          dart pub global activate melos
          melos bootstrap

  test:
    needs: setup
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FLUTTER_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ needs.setup.outputs.flutter-version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ needs.setup.outputs.cache-key-pub }}
          restore-keys: ${{ runner.os }}-pub-cache-

      - name: Activate melos and bootstrap
        run: |
          dart pub global activate melos
          melos bootstrap

      - name: Run Melos format check
        run: melos format --set-exit-if-changed .

      - name: Run analyze
        run: melos run analyze

      - name: Run tests
        run: |
          flutter test --no-pub
          melos run test:all --no-select

  build-apk:
    needs: [setup, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FLUTTER_WORKING_DIR }}
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Decode keystore from base64
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Set up signing properties
        run: |
          cat > android/app/key.properties << EOF
          storeFile=keystore.jks
          keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_PASSWORD }}
          EOF

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ needs.setup.outputs.flutter-version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ needs.setup.outputs.cache-key-pub }}
          restore-keys: ${{ runner.os }}-pub-cache-

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ needs.setup.outputs.cache-key-gradle }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Activate melos and bootstrap
        run: |
          dart pub global activate melos
          melos bootstrap

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Get version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | head -n1 | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build APK
        run: flutter build apk --release --target-platform android-arm64 --no-pub --build-number ${{ github.run_number }}

      - name: Rename APK with version
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/borneo-app-${{ steps.get_version.outputs.version }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: borneo-app-${{ steps.get_version.outputs.version }}
          path: ${{ github.workspace }}/${{ env.FLUTTER_WORKING_DIR }}/build/app/outputs/flutter-apk/borneo-app-${{ steps.get_version.outputs.version }}.apk

  build-windows:
    needs: [setup, test]
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ${{ env.FLUTTER_WORKING_DIR }}
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ needs.setup.outputs.flutter-version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ needs.setup.outputs.cache-key-pub }}
          restore-keys: ${{ runner.os }}-pub-cache-

      - name: Cache MSBuild
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/Microsoft/VisualStudio
          key: ${{ runner.os }}-msbuild-${{ hashFiles('client/windows/**') }}
          restore-keys: ${{ runner.os }}-msbuild-

      - name: Activate melos and bootstrap
        run: |
          dart pub global activate melos
          melos bootstrap

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Get version from pubspec.yaml
        id: get_version
        run: |
          $version = (Select-String -Path pubspec.yaml -Pattern '^version:' | Select-Object -First 1).Line.Split(':')[1].Trim().Split('+')[0]
          echo "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build Windows executable
        run: flutter build windows --release --no-pub --build-number ${{ github.run_number }}

      - name: Create and zip Windows release
        run: |
          pwsh ./scripts/windows-dist-pack.ps1 ${{ steps.get_version.outputs.version }}

      - name: Upload Windows zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: borneo-app-${{ steps.get_version.outputs.version }}-windows-x64
          path: client\build\windows\dist\borneo-app-${{ steps.get_version.outputs.version }}-windows-x64.zip

  release:
    needs: [build-apk, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts
          merge-multiple: true

      - name: Set prerelease flag
        id: set_prerelease
        run: |
          if [[ "${{ needs.build-apk.outputs.version }}" == *beta* || "${{ needs.build-apk.outputs.version }}" == *alpha* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: app-v${{ needs.build-apk.outputs.version }}
          name: Borneo-IoT App Release app-v${{ needs.build-apk.outputs.version }}
          draft: false
          prerelease: ${{ steps.set_prerelease.outputs.prerelease }}
          files: |
            release-artifacts/borneo-app-${{ needs.build-apk.outputs.version }}.apk
            release-artifacts/borneo-app-${{ needs.build-windows.outputs.version }}-windows-x64.zip